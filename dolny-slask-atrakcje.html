<style>
:root{--ink:#1a1a2e;--paper:#f5f0e8;--parchment:#ede8d8;--accent:#8b2c2c;--gold:#c9a84c;--moss:#4a6741;--sky:#4a7fa5;--muted:#8a8070;--checked-bg:#eaf5ea;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Lato',sans-serif;min-height:100vh;}
header{background:var(--ink);color:var(--paper);padding:2rem 1.5rem 1.8rem;text-align:center;position:relative;overflow:hidden;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--gold),var(--moss),var(--sky),var(--accent));}
h1{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,5vw,2.8rem);font-weight:900;}
h1 span{color:var(--gold);}
.subtitle{font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(245,240,232,.5);margin-top:.3rem;font-weight:300;}
.controls{display:flex;flex-wrap:wrap;gap:.6rem;padding:1rem 1.2rem;background:var(--parchment);border-bottom:1px solid rgba(0,0,0,.08);align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.stats{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--muted);}
.stats strong{color:var(--moss);font-size:1.1rem;}
.btn-group{display:flex;gap:.4rem;flex-wrap:wrap;}
button{font-family:'Lato',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.4rem .9rem;border:1.5px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;transition:all .18s;border-radius:2px;}
button:hover{background:var(--ink);color:var(--paper);}
button.danger{border-color:var(--accent);color:var(--accent);}
button.danger:hover{background:var(--accent);color:var(--paper);}
.progress-bar{height:3px;background:rgba(0,0,0,.08);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--moss),var(--gold));transition:width .4s ease;}
.category-section{margin:0;}
.category-header{display:flex;align-items:center;gap:.7rem;padding:.9rem 1.2rem .4rem;cursor:pointer;user-select:none;}
.category-header h2{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);flex:1;}
.cat-count{font-size:.72rem;color:var(--muted);font-weight:300;}
.cat-toggle{font-size:.72rem;color:var(--muted);transition:transform .2s;}
.category-section.collapsed .cat-toggle{transform:rotate(-90deg);}
.category-section.collapsed .items-list{display:none;}
.items-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:0;padding:0 .8rem .8rem;}
.item{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .7rem;cursor:pointer;border-radius:4px;transition:background .15s;user-select:none;}
.item:hover{background:rgba(0,0,0,.04);}
.item.checked{background:var(--checked-bg);}
.item.checked .item-name{text-decoration:line-through;color:var(--moss);opacity:.75;}
.item.checked .item-short{opacity:.5;}
.checkbox{width:17px;height:17px;min-width:17px;border:2px solid rgba(0,0,0,.22);border-radius:3px;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s;font-size:.65rem;color:white;background:transparent;}
.item.checked .checkbox{background:var(--moss);border-color:var(--moss);}
.item-idx{font-size:.62rem;font-weight:700;color:var(--muted);min-width:20px;text-align:right;margin-top:3px;}
.item-body{flex:1;min-width:0;}
.item-name{font-weight:700;font-size:.85rem;color:var(--ink);line-height:1.3;}
.item-short{font-size:.7rem;color:var(--muted);font-weight:300;margin-top:.1rem;line-height:1.35;}
.item-meta{display:flex;gap:.5rem;margin-top:.25rem;flex-wrap:wrap;}
.badge{font-size:.6rem;font-weight:700;letter-spacing:.06em;padding:.15rem .4rem;border-radius:2px;text-transform:uppercase;}
.badge-dist{background:rgba(74,127,165,.12);color:var(--sky);}
.badge-time{background:rgba(74,103,65,.12);color:var(--moss);}
.info-btn{font-size:.6rem;font-weight:700;letter-spacing:.06em;padding:.15rem .45rem;border-radius:2px;background:rgba(201,168,76,.15);color:#8a6a10;border:none;cursor:pointer;margin-left:auto;white-space:nowrap;transition:background .15s;}
.info-btn:hover{background:rgba(201,168,76,.35);}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(0,0,0,.07),transparent);margin:0 1.2rem;}
.hidden{display:none!important;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,10,20,.65);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--paper);width:100%;max-width:520px;max-height:88vh;border-radius:12px 12px 0 0;overflow:hidden;display:flex;flex-direction:column;transform:translateY(40px);transition:transform .28s ease;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-img{width:100%;height:200px;object-fit:cover;background:#d4cfc5;flex-shrink:0;}
.modal-img-placeholder{width:100%;height:200px;background:linear-gradient(135deg,var(--parchment),#d4cfc5);display:flex;align-items:center;justify-content:center;font-size:3rem;flex-shrink:0;}
.modal-body{padding:1.2rem 1.4rem 1.6rem;overflow-y:auto;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;color:var(--ink);line-height:1.25;}
.modal-badges{display:flex;gap:.5rem;margin:.6rem 0 .9rem;flex-wrap:wrap;}
.modal-badge{font-size:.68rem;font-weight:700;padding:.2rem .55rem;border-radius:3px;letter-spacing:.07em;text-transform:uppercase;}
.modal-nav-btn{display:inline-block;padding:.5rem 1.2rem;background:var(--moss);color:white;text-decoration:none;border-radius:4px;font-size:.82rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin:.2rem 0 .5rem;}
.modal-nav-btn:hover{background:#3a5233;}
.modal-desc{font-size:.88rem;line-height:1.7;color:#3a3530;}
.modal-close{position:absolute;top:.8rem;right:.9rem;width:2rem;height:2rem;border-radius:50%;background:rgba(0,0,0,.35);color:white;border:none;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;z-index:101;}
.modal-wrapper{position:relative;width:100%;max-width:520px;}
footer{text-align:center;padding:1.5rem;font-size:.72rem;color:var(--muted);border-top:1px solid rgba(0,0,0,.07);margin-top:.5rem;}
@media(min-width:600px){.modal-overlay{align-items:center;}.modal{border-radius:12px;max-height:80vh;}.modal-img,.modal-img-placeholder{height:240px;}}
@media(max-width:400px){.items-list{grid-template-columns:1fr;}}
</style>
</head>

        </div>
        <div class="modal-desc" id="modal-desc"></div>
      </div>
    </div>
  </div>
</div>

<footer>Kliknij aby zaznaczyć · ikona 📖 otwiera opis · nawigacja Google Maps</footer>

        desc: "Zamek Grodziec wznosi się na bazaltowym wzgórzu koło Złotoryi, górując nad okolicą z wysokości 389 m n.p.m. Zbudowany w XV wieku, należał do najważniejszych twierdz Dolnego Śląska i był wielokrotnie oblegany. Imponujące cylindryczne wieże i dobrze zachowane mury tworzą niepowtarzalną sylwetkę widoczną z daleka. Na zamku odbywają się pokazy walk rycerskich i turnieje, ożywiające jego bogatą historię. Z ruin rozciąga się szeroka panorama na Nizinę Śląską i Sudety." },

        desc: "Śnieżnik to najwyższy szczyt Masywu Śnieżnika i całych Sudetów Wschodnich, osiągający 1425 m n.p.m. na polsko-czeskiej granicy. Jest jedynym szczytem masywu wyrastającym ponad górną granicę lasu, co zapewnia niemal pełną panoramę 360 stopni. Z wierzchołka roztacza się widok na Karkonosze, Tatry w dobre dni i rozległe Morawy po stronie czeskiej. W okolicach szczytu bierze swój początek rzeka Morawa, dopływ Dunaju, co czyni go miejscem szczególnym dla miłośników geografii. Masyw słynie z gęstej sieci jaskiń i podziemi, w tym pobliskiej Jaskini Niedźwiedziej." },
      { name: "Luž / Lausche (793 m)", short: "Wygasły wulkan w Górach Łużyckich, DE/CZ",
        km: 150, time: "2 godz 9 min",
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Lausche_Zittauer_Gebirge.jpg/800px-Lausche_Zittauer_Gebirge.jpg",
        desc: "Luž, znany po niemiecku jako Lausche, to najwyższy szczyt Gór Łużyckich (793 m n.p.m.) na pograniczu Czech i Niemiec. Jest wygasłym wulkanem bazaltowym o charakterystycznej, stożkowatej sylwetce, widocznej z wielu miejsc w okolicy. Z wieży widokowej na szczycie roztacza się panorama na Niemcy, Polskę i Czechy — jeden z niewielu miejsc, gdzie można zobaczyć trzy kraje jednocześnie. Wejście z Jonsdorfu po stronie niemieckiej lub z Nowego Města po stronie czeskiej zajmuje około godziny. To jeden z 22 szczytów Korony Sudetów PTTK." },
      { name: "Wielka Sowa (1015 m)", short: "Najwyższy szczyt Gór Sowich, wieża widokowa",
        km: 14, time: "12 min",
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Wielka_Sowa_szczyt.jpg/800px-Wielka_Sowa_szczyt.jpg",
        desc: "Wielka Sowa to najwyższy szczyt Gór Sowich (1015 m n.p.m.) i jeden z najbliższych Iwinom szczytów Korony Sudetów. Na wierzchołku stoi stalowa wieża widokowa, z której rozciąga się panorama obejmująca Kotlinę Kłodzką, Karkonosze i Góry Stołowe. Popularne szlaki prowadzą z Walimia, Rzeczki i Przełęczy Jugowskiej, a czas wejścia wynosi od 1 do 2 godzin. Góry Sowie słyną z rozbudowanej sieci podziemnych tuneli z czasów II wojny światowej (projekt Riese), dostępnych w Osówce i Włodarz. Latem i zimą Wielka Sowa przyciąga rzesze turystów z całego Dolnego Śląska." },
      { name: "Skopiec (724 m)", short: "Korona Sudetów, Góry Kaczawskie, wieża",

        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Skopiec_2011.jpg/800px-Skopiec_2011.jpg",
        desc: "Skopiec to najwyższy szczyt Gór Kaczawskich (724 m n.p.m.) i jeden z 22 szczytów Korony Sudetów PTTK. Na wierzchołku stoi drewniana wieża widokowa, z której widać rozległą panoramę Dolnego Śląska — Karkonosze, Góry Sowie i Wałbrzyskie. Wejście z pobliskich miejscowości zajmuje ok. 1–1,5 godziny spokojnym tempem. Góry Kaczawskie to region szczególny geologicznie — można tu znaleźć półszlachetne kamienie i skamieniałości. Szlak przez Skopiec można łączyć z wycieczką do pobliskich formacji wulkanicznych." },
      { name: "Ostrzyca Proboszczowska (501 m)", short: "Śląski Matterhorn, bazaltowy stożek",

        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Ostrzyca_Proboszczowicka.jpg/800px-Ostrzyca_Proboszczowicka.jpg",
        desc: "Ostrzyca Proboszczowska to wyjątkowy szczyt w Pogórzu Kaczawskim, bazaltowy stożek wulkaniczny wznoszący się nagle spośród płaskiej równiny na 501 m n.p.m. Kształtem przypomina miniaturowy Matterhorn, co przysporzyło jej przydomka śląskiego Matterhornu. Jest najwyższym szczytem Pogórza Kaczawskiego i punktem Korony Sudetów Polskich PTTK (Oddział Wałbrzych). Na szczycie stoi stary punkt triangulacyjny i krzyż, a widok obejmuje całą Nizinę Śląską. Szlak na szczyt jest krótki, ale stromy." },
      { name: "Szczeliniec Wielki (919 m)", short: "Najwyższy szczyt Gór Stołowych",

        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Szczeliniec_Wielki.jpg/800px-Szczeliniec_Wielki.jpg",
        desc: "Szczeliniec Wielki to najwyższy szczyt Gór Stołowych (919 m n.p.m.) i jeden z najbardziej spektakularnych punktów widokowych w Sudetach. Masyw zbudowany z piaskowca tworzy pionowe ściany opadające w dolinę, a na płaskim grzbiecie rozciąga się labirynt wąskich szczelin i formacji skalnych z fantastycznymi nazwami. Na szczycie stoi schronisko z tarasem widokowym oferującym panoramę na Kotlinę Kłodzką i Sudety Środkowe. Wejście stromymi schodami wybitymi w skale jest dostępne dla wszystkich, choć wymaga sprawności. To jeden z 22 szczytów Korony Sudetów PTTK." },
      { name: "Kowadło (989 m)", short: "Góry Złote, skałki, malownicze szczyty",

        desc: "Kowadło to jeden z czołowych szczytów Gór Złotych (989 m n.p.m.), grupy górskiej na pograniczu polsko-czeskim w Sudetach Wschodnich. Charakterystyczne skałki na szczycie tworzą malowniczą sylwetkę, a widok obejmuje Masyw Śnieżnika i Kotlinę Kłodzką. Góry Złote to region mało znany i rzadko odwiedzany, co czyni wycieczki tu wyjątkowo atrakcyjnymi dla szukających spokoju. W pobliżu znajduje się słynna Jaskinia Radochowska i Kopalnia Złota w Złotym Stoku. Szlak na Kowadło można łączyć z wędrówką przez całe pasmo Gór Złotych." },

        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Trojmorski_Wierch.jpg/800px-Trojmorski_Wierch.jpg",
        desc: "Trójmorski Wierch (1145 m n.p.m.) to jeden z najciekawszych geograficznie szczytów w Masywie Śnieżnika — z jego wierzchołka wody spływają do trzech różnych mórz: Bałtyckiego, Czarnego i Północnego. Ten wyjątkowy trójdział wodny czyni go miejscem wyjątkowym w skali Europy. Szczyt leży w Koronie Sudetów Polskich, a szlak prowadzi przez gęste lasy i połoniny z widokami na Śnieżnik i Góry Bialskie. W pobliżu szczytu ustawiono tablicę informacyjną o fenomenie trójmorza. To obowiązkowy punkt dla każdego miłośnika ciekawostek geograficznych." },

        desc: "Rudawiec to najwyższy szczyt Gór Bystrzyckich (1106 m n.p.m.) i punkt Korony Sudetów Polskich. Masyw Gór Bystrzyckich rozciąga się wzdłuż granicy z Czechami na południe od Kotliny Kłodzkiej. Trasy na szczyt prowadzą przez rozległe łąki i połoniny z widokami na Kotlinę Kłodzką i Góry Stołowe. W pobliżu szczytu warto odwiedzić rezerwat przyrody chroniący unikalne gatunki roślinności subalpejskiej. Okolice Rudawca to raj dla miłośników spokojnej turystyki daleko od tłumów." },

        desc: "Kościoły Pokoju w Jaworze i Świdnicy to wpisane na Listę Światowego Dziedzictwa UNESCO największe drewniane budowle sakralne w Europie, zbudowane na mocy pokoju westfalskiego w XVII wieku. Protestanci mogli je wznieść wyłącznie z nietrwałych materiałów — drewna, gliny i słomy — bez kamiennych fundamentów i wieży. Kościół w Świdnicy mieści ok. 7500 osób, a w Jaworze ok. 6000, co czyni je jednymi z największych kościołów protestanckich na świecie. Wnętrza zachwycają bogactwem polichromii, empor i snycerki, mimo materialnych ograniczeń. Obydwa kościoły są czynne i odbywają się w nich regularne nabożeństwa." },

      { name: "Klasztor Cystersów w Krzeszowie", short: "Perła Baroku Śląskiego",

      { name: "Bazylika w Bardzie Śląskim", short: "Sanktuarium Matki Bożej Bardzkiej",

        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Bardo_Slaskie_bazylika.jpg/800px-Bardo_Slaskie_bazylika.jpg",
        desc: "Bazylika Nawiedzenia NMP w Bardzie Śląskim to jedno z najważniejszych sanktuariów maryjnych na Dolnym Śląsku, związane z cudowną figurką Matki Bożej Bardzkiej. Kościół barokowy z XVIII wieku stoi na miejscu wcześniejszych świątyń, a tradycja pielgrzymkowa sięga tu ponad 700 lat. Wnętrze bazyliki zachwyca bogatymi stiukami, freskami i barokowymi ołtarzami. Bardo Śląskie leży w malowniczym przełomie Nysy Kłodzkiej, co czyni okolicę wyjątkowo atrakcyjną turystycznie. Sanktuarium odwiedzają rocznie tysiące pielgrzymów z całej Polski." },
      { name: "Klasztor Franciszkanów Wrocław", short: "Gotyk, sarkofagi Piastów",
        km: 70, time: "1 godz",
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Wroclaw_franciszkanie.jpg/800px-Wroclaw_franciszkanie.jpg",
        desc: "Klasztor Franciszkanów we Wrocławiu to jeden z najstarszych gotyckich kościołów w mieście, mieszczący sarkofagi Piastów śląskich z XIII i XIV wieku. Kościół pw. Wniebowzięcia NMP zachował piękne gotyckie detale architektoniczne i cenną rzeźbę nagrobną. Zakon franciszkanów działał tu nieprzerwanie od XIII wieku i wciąż prowadzi klasztor. Wnętrze skrywa liczne tablice epitafijne i zabytki sztuki sakralnej. To ważne miejsce kultu i jeden z mniej tłocznych zabytkowych kościołów w centrum Wrocławia." },
      { name: "Klasztor w Lubiążu", short: "Największy klasztor cysterski na świecie",
        km: 100, time: "1 godz 25 min",
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Lubiaz-klasztor.jpg/800px-Lubiaz-klasztor.jpg",
        desc: "Klasztor w Lubiążu to jeden z największych i najdłuższych budynków sakralnych w Europie — jego fasada frontowa mierzy aż 223 metry. Cystersi wznieśli go w obecnej formie barokowej w XVII-XVIII wieku na miejscu wcześniejszego opactwa z XII wieku. W czasach III Rzeszy klasztor był siedzibą instytutu rasowego SS, a po wojnie składnicą muzealną i ochronką zdrowotną. Dziś trwa powolna restauracja tego zabytkowego kompleksu przez fundację. Wnętrza kościoła klasztornego z monumentalnymi freskami robią niesamowite wrażenie." },

  {
    cat: "🏛️ Wrocław – must see",
    items: [
      { name: "Ostrów Tumski", short: "Najstarsza część Wrocławia, katedra gotycka",
        km: 70, time: "1 godz",
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/db/Ostrow_Tumski_Wroclaw.jpg/800px-Ostrow_Tumski_Wroclaw.jpg",
        desc: "Ostrów Tumski to historyczne serce Wrocławia — wyspa na Odrze, gdzie miasto zrodziło się ponad tysiąc lat temu. Dominuje tu gotycka katedra pw. Jana Chrzciciela z XIV-XV wieku z dwiema charakterystycznymi wieżami i platformą widokową. Wieczorami Ostrów Tumski jako jedyna część Wrocławia jest oświetlana gazowymi latarniami — latarnik co dzień je zapala ręcznie. Plac Katedralny i otaczające go kościoły, pałace i kolegiaty tworzą jeden z najpiękniejszych historycznych zespołów urbanistycznych w Polsce. To obowiązkowy punkt każdej wizyty we Wrocławiu." },
      { name: "Rynek Wrocław + Ratusz", short: "Jeden z największych rynków w Polsce",
        km: 70, time: "1 godz",
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/01/Wroclaw_rynek.jpg/800px-Wroclaw_rynek.jpg",
        desc: "Wrocławski Rynek jest jednym z największych rynków średniowiecznych w Polsce (213×178 m) i od stuleci centrum życia miasta. Stojący pośrodku Ratusz z przełomu XIV-XVI wieku należy do najpiękniejszych gotyckich budowli świeckich w Europie Środkowej — jego dekoracyjna wschodnia elewacja jest prawdziwym arcydziełem kamieniarskim. Dookoła rynku stoją barokowe i klasycystyczne kamieniczki, restauracje i kawiarnie. W podziemiach Ratusza mieści się Muzeum Sztuki Mieszczańskiej. Rynek jest sercem miejskiego życia przez cały rok — od jarmarku bożonarodzeniowego po letnie festiwale." },
      { name: "Panorama Racławicka", short: "Monumentalna panorama bitwy 1794 r.",
        km: 70, time: "1 godz",
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Panorama_raclawicka.jpg/800px-Panorama_raclawicka.jpg",
        desc: "Panorama Racławicka to jedno z największych dzieł malarskich w Polsce — olbrzymie cylindryczne płótno o wymiarach 15×120 metrów, przedstawiające bitwę pod Racławicami z 1794 roku. Namalowana we Lwowie w 1894 roku przez Jana Stykę i Wojciecha Kossaka, trafiła do Wrocławia po II wojnie światowej. Widz stoi w centrum okrągłej rotundy otoczony panoramicznym obrazem z trójwymiarowym pierwszym planem, co tworzy poczucie uczestnictwa w batalii. Panorama jest eksponowana w specjalnie dla niej zaprojektowanej rotundzie przy pl. Jana Pawła II. Odwiedziny wymagają wcześniejszej rezerwacji i biletów." },
      { name: "Hala Stulecia (Hala Ludowa)", short: "UNESCO, arcydzieło modernizmu Maxa Berga",
        km: 71, time: "1 godz 1 min",
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Hala_Stulecia_Wroclaw.jpg/800px-Hala_Stulecia_Wroclaw.jpg",
        desc: "Hala Stulecia (dawna Hala Ludowa) to wyjątkowe dzieło architektury modernistycznej zaprojektowane przez Maxa Berga i zbudowane w 1913 roku z okazji stulecia zwycięstwa nad Napoleonem. Olbrzymia kopuła żelbetowa o średnicy 65 metrów była w momencie budowy największą na świecie i pozostaje jednym z symboli nowoczesnej architektury XX wieku. W 2006 roku Hala została wpisana na Listę Światowego Dziedzictwa UNESCO. Wewnątrz odbywają się koncerty, targi i mecze, a otaczający ją Ogród Japoński i fontanna multimedialna tworzą atrakcyjny kompleks. To obowiązkowy punkt na mapie Wrocławia dla miłośników architektury." },
      { name: "ZOO Wrocław + Afrykarium", short: "Jedno z najlepszych zoo w Europie",
        km: 71, time: "1 godz 1 min",
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Wroclaw_zoo.jpg/800px-Wroclaw_zoo.jpg",
        desc: "Wrocławskie ZOO to jedno z najstarszych i największych ogrodów zoologicznych w Polsce, założone w 1865 roku. Uzupełnia je wyjątkowe Afrykarium — pierwsze w Polsce i jedno z pierwszych w Europie pawilony poświęcone środowisku wodnemu Afryki z żywymi morświnami, mantagami i tropikalnymi rybami. Zoo liczy ponad 10 000 zwierząt reprezentujących ponad 1100 gatunków, a rocznie odwiedza je kilka milionów gości. Dla rodzin z dziećmi to jeden z najlepszych celów wypadu w region. Na pełne zwiedzanie warto zarezerwować cały dzień." },
      { name: "Muzeum Narodowe Wrocław", short: "Największa kolekcja sztuki śląskiej",
        km: 70, time: "1 godz",

        desc: "Muzeum Narodowe we Wrocławiu to jedno z największych muzeów w Polsce, z bogatą kolekcją sztuki śląskiej od średniowiecza do XX wieku. Szczególnie cenne są zbiory rzeźby romańskiej i gotyckiej, w tym tympanon z Ołbina — arcydzieło romańskiego rzeźbiarstwa. Muzeum przechowuje ponad 230 000 dzieł sztuki, a stała ekspozycja zajmuje kilkadziesiąt sal. Obok sztuki śląskiej można podziwiać europejskie malarstwo od renesansu do modernizmu. To obowiązkowe miejsce dla każdego miłośnika historii sztuki i kultury regionu." },
      { name: "Hydropolis Wrocław", short: "Interaktywne centrum wiedzy o wodzie",
        km: 70, time: "1 godz",
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Hydropolis_Wroclaw.jpg/800px-Hydropolis_Wroclaw.jpg",
        desc: "Hydropolis to wyjątkowe centrum nauki poświęcone wodzie, ulokowane w zabytkowym podziemnym zbiorniku wody pitnej z XIX wieku. Nowoczesna, interaktywna ekspozycja na 4 000 m² opowiada o wodzie jako źródle życia, jej obiegach, historii cywilizacji nad rzekami i współczesnym zarządzaniu zasobami. Efekty specjalne, hologramy i instalacje multimedialne czynią wizytę niezapomnianą dla dzieci i dorosłych. Samo wnętrze dawnego zbiornika — ogromne sklepione komnaty — robi niesamowite wrażenie architektoniczne. Warto zarezerwować bilet wcześniej, bo Hydropolis jest bardzo popularne." },
      { name: "Wyspy na Odrze + mosty Wrocławia", short: "Mostek Tumski, wyspy i klimat kanałów",

        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/16/Wroclaw_Tumski_Bridge.jpg/800px-Wroclaw_Tumski_Bridge.jpg",
        desc: "Wrocław leży na 12 wyspach i ma ponad 100 mostów, co nadaje mu unikatowy klimat porównywalny z Wenecją czy Amsterdamem. Słynny Mostek Tumski — żeliwna kładka z XIX wieku — jest ozdobionym tysiącami kłódek symbolem miłości, jednym z najbardziej romantycznych miejsc w mieście. Spacer Wyspą Piaskową, z gotyckim kościołem NMP na Piasku, i Wyspą Słodową to ulubiony odpoczynek wrocławian. Kanały Odry o zachodzie słońca tworzą niezapomniane widoki. Rowerowa objazdówka wyspami i mostami to jeden z najlepszych sposobów na poznanie Wrocławia." },
      { name: "Taras widokowy SKY Tower", short: "Najwyższy taras widokowy w Polsce",

        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Sky_Tower_Wroclaw.jpg/800px-Sky_Tower_Wroclaw.jpg",
        desc: "SKY Tower to najwyższy budynek w Polsce poza Warszawą (212 m), stojący przy ul. Powstańców Śląskich we Wrocławiu. Na 49. piętrze mieści się taras widokowy SkyHigh, skąd przy dobrej pogodzie widać Karkonosze, Góry Sowie i całą panoramę Wrocławia. Nowoczesna winda ze szklanymi ścianami wiezie na górę w kilkanaście sekund, a na samym tarasie można skorzystać z tablic informacyjnych i wykonać wyjątkowe zdjęcia. W budynku mieści się centrum handlowe, apartamenty i biura. Dla miłośników widoków i architektury współczesnej obowiązkowy punkt programu." },

        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Kopalnia_uranu_kletno.jpg/800px-Kopalnia_uranu_kletno.jpg",

      { name: "Jaskinia Niedźwiedzia w Kletnie", short: "Kości jaskiniowych niedźwiedzi, stalagmity",

      { name: "Jaskinia Radochowska", short: "Korytarze krasowe w Górach Złotych",

      { name: "Sztolnie Walimskie – Osówka", short: "Podziemia projektu Riese, Góry Sowie",

        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/20/Osowka_sztolnie.jpg/800px-Osowka_sztolnie.jpg",

      { name: "Kopalnia Złota w Złotym Stoku", short: "Historyczna kopalnia, podziemna rzeka",

        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/Zloty_Stok_kopalnia.jpg/800px-Zloty_Stok_kopalnia.jpg",
        desc: "Kopalnia Złota w Złotym Stoku to najstarsze i największe tego typu muzeum górnicze w Polsce, otwarte w podziemiach historycznej kopalni złota i arsenu czynnej przez ponad 700 lat. Podziemna trasa turystyczna liczy blisko 2 km i obejmuje spektakularny wodospad pod ziemią oraz rejs łódką podziemną rzeką. Ekspozycja opowiada o technikach wydobycia i historii górnictwa od średniowiecza po XX wiek. Na powierzchni znajduje się skansen i prasa do bicia monet, gdzie można wycisnąć pamiątkową monetę. To jedno z najpopularniejszych miejsc na Ziemi Kłodzkiej dla całych rodzin." },
      { name: "Sztolnia Czarnego Pstrąga", short: "UNESCO, zabytkowa kopalnia srebra, Tarnowskie Góry",

        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Kopalnia_srebra_tarnowskie_gory.jpg/800px-Kopalnia_srebra_tarnowskie_gory.jpg",
        desc: "Sztolnia Czarnego Pstrąga w Tarnowskich Górach to część wpisanego na Listę UNESCO kompleksu zabytkowej kopalni srebra, ołowiu i cynku czynnej od XVI do XX wieku. Trasa obejmuje spływ łódką przez zalane tunele kopalniane, co jest jednym z najbardziej niezwykłych doświadczeń turystycznych w Polsce. Sztolnia ma blisko 600 metrów długości i imponuje skalą inżynierskich systemów odwadniania i wentylacji. Wpis na Listę UNESCO podkreśla wyjątkową wartość historyczną i techniczną obiektu. Warto zarezerwować bilety z dużym wyprzedzeniem — to jedno z najbardziej obleganych podziemi w Polsce." },
      { name: "Podziemne Miasto Włodarz", short: "Kompleks RIESE, największy obiekt projektu",
        km: 22, time: "18 min",
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Wlodarz_Riese.jpg/800px-Wlodarz_Riese.jpg",
        desc: "Włodarz to największy z kompleksów podziemnych projektu Riese w Górach Sowich, wykuty przez Niemców w czasie II wojny światowej przy użyciu więźniów obozów pracy. Sieć kilkukilometrowych tuneli, sal i szyb kryje się pod szczytem Włodarz (743 m n.p.m.), a zwiedzanie odbywa się trasą turystyczną z przewodnikiem lub samodzielnie. Otacza ją tajemnica — historycy do dziś spekulują, czy był to bunkier Hitlera, zakład zbrojeniowy czy coś zupełnie innego. Temperatura wewnątrz to stałe 8°C niezależnie od pory roku. Włodarz leży kilka minut od Iwin — to najprzystępniejsza atrakcja w pobliżu." },

        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/KGHM_Lubin.jpg/800px-KGHM_Lubin.jpg",
        desc: "KGHM Lubin to polska korporacja będąca jednym z największych producentów miedzi i srebra na świecie, a jej kopalnie w okolicach Lubina i Głogowa są otwarte dla grup zorganizowanych na specjalnych wycieczkach. Zjazd kilkusetmetrowym szybem do podziemi czynnej kopalni to niesamowite przeżycie, pokazujące skalę przemysłowego wydobycia. Zwiedzanie obejmuje prawdziwe chodniki, maszyny górnicze i pokaz wzbogacania rudy. To unikalna możliwość zobaczenia czynnej kopalni od środka, dostępna przez centrum edukacyjne KGHM. Wycieczki wymagają wcześniejszej rezerwacji." },

        desc: "Karkonoski Park Narodowy to jeden z najstarszych i najsłynniejszych parków narodowych w Polsce, chroniący unikatowe ekosystemy najwyższych Sudetów. Torfowiska subalpejskie, stawy polodowcowe (Małe i Wielkie Stawki), wodospady i niezwykłe formacje skalne tworzą krajobraz rodem z baśni. Wiosną Kotlina Jeleniogórska słynie z krokusów pokrywających łąki, jesienią kolory borówek i trawy tworzą złocisto-czerwone dywany na grzbietach. Przez park prowadzą trasy dla piechurów, rowerzystów i biegaczy, w tym słynna Droga Jubileuszowa. Centrum Edukacji Ekologicznej w Jeleniej Górze uzupełnia wiedzę o przyrodzie regionu." },
      { name: "Park Narodowy Gór Stołowych", short: "Płaskowyże, labirynty, Szczeliniec",

        desc: "Park Narodowy Gór Stołowych to jedyny w Polsce park obejmujący góry o budowie płytowej — poziome ławice piaskowca tworzą płaskowyże z pionowymi ścianami opadającymi w dolinę. Główne atrakcje to Szczeliniec Wielki ze skalnym labiryntem i panoramą oraz Błędne Skały z ciasną siecią szczelin i tuneli. Park jest mały, ale niezwykle zwarty i bogaty — można go zwiedzić w jeden intensywny dzień lub na spokojnie przez weekend. Schronisko na Szczelińcu to jedna z najstarszych górskich baz turystycznych w Polsce. Park sąsiaduje z czeskim Adrszpachem, tworząc transgraniczną atrakcję." },

        km: 80, time: "1 godz 8 min",
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Dolina_Baryczy.jpg/800px-Dolina_Baryczy.jpg",
        desc: "Dolina Baryczy to obszar chroniony obejmujący największy kompleks stawów rybnych w Polsce, prowadzonych przez wiele wieków jako gospodarka karpiowa. Tysiące hektarów stawów, łąk i lasów tworzą siedlisko dla ponad 300 gatunków ptaków, w tym bociana czarnego, żurawia i wielu gatunków kaczek i gęsi. Europejski rezerwat biosfery UNESCO chroni unikatowy krajobraz kulturowy starej hodowli ryb śląskiej. Szlak rowerowy przez Dolinę Baryczy liczy ponad 200 km i prowadzi przez Milicz, Żmigród i liczne rezerwaty. To raj dla ornitologów, fotografów przyrody i miłośników spokojnej turystyki." },
      { name: "Bory Dolnośląskie", short: "Rozległy kompleks leśny, żurawie",
        km: 100, time: "1 godz 25 min",
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Bory_Dolnoslaskie.jpg/800px-Bory_Dolnoslaskie.jpg",
        desc: "Bory Dolnośląskie to jeden z największych kompleksów leśnych w Polsce — ponad 160 000 hektarów borów sosnowych na sandurze polodowcowym. Niemal pusta równina przecięta rzeką Kwisą i Czarną Wodą jest domem dla żurawi, wilków, rysi i żółwi błotnych. Jesienią i wiosną przeloty żurawi nad borami to jedno z największych widowisk przyrodniczych w Polsce. Przez lasy prowadzą szlaki rowerowe i piesze, a liczne jeziora polanki zapraszają do odpoczynku. Bory kryją też ślady II wojny światowej — lotniska, bunkry i poligony wojskowe." },
      { name: "Wodospad Kamieńczyka", short: "Najwyższy wodospad w polskich Sudetach",

        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Wodospad_Kamienczyk.jpg/800px-Wodospad_Kamienczyk.jpg",
        desc: "Wodospad Kamieńczyka w Szklarskiej Porębie to najwyższy wodospad w polskiej części Sudetów, skaczący z progów granitowych na łączną wysokość 27 metrów. Jasny, pienisty potok ciśnie się przez wąskie skalne koryto i tworzy mglistą chmurę wody, zimą zamieniającą się w lodospady. Dojście od centrum Szklarskiej Poręby zajmuje ok. 45 minut atrakcyjną trasą wzdłuż rzeki. W pobliżu leży mniejszy, ale piękny Wodospad Szklarki (13 m). Okolica jest jednym z najchętniej odwiedzanych rejonów turystycznych Karkonoszy." },
      { name: "Wodospad Szklarki", short: "Piękny wodospad w Karkonoszach",

        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/95/Wodospad_Szklarki.jpg/800px-Wodospad_Szklarki.jpg",
        desc: "Wodospad Szklarki to malowniczy wodospad na rzece Szklarce w Szklarskiej Porębie, skaczący z granitu na wysokość 13 metrów. Otoczony jest gęstym lasem bukowym i świerkowym, a do wodospadu prowadzi przyjemna, krótka ścieżka (ok. 20 minut z centrum). Zimą wodospad częściowo zamarza, tworząc spektakularny lodospad. Dzięki bliskości centrum i krótkiej trasie dostępowej jest jedną z najłatwiej dostępnych naturalnych atrakcji Karkonoszy. Szklarska Poręba to prężny ośrodek turystyczny z szeroką ofertą zimową i letnią." },
      { name: "Jezioro Nyskie i Otmuchowskie", short: "Zbiorniki retencyjne, kąpieliska, sporty wodne",

        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Jezioro_Nyskie.jpg/800px-Jezioro_Nyskie.jpg",
        desc: "Jezioro Nyskie i Jezioro Otmuchowskie to sztuczne zbiorniki na rzece Nysa Kłodzka, stanowiące największy akwen Dolnego Śląska o łącznej powierzchni ponad 3000 ha. Latem oba jeziora tętnią życiem — plaże, wypożyczalnie kajaków, windsurfing, rejsy statkami wycieczkowym i kempingi nad samą wodą. Otmuchów to malownicze miasteczko z zamkiem biskupów wrocławskich z widokiem na Jezioro Otmuchowskie. Nysa, leżąca nad samym jeziorem, jest bogatą w zabytki i historię stolicą regionu. To doskonałe miejsce na letni wyjazd z dziećmi." },

        desc: "Stawy Milickie w Dolinie Baryczy to jeden z największych kompleksów stawów hodowlanych w Europie, od wieków prowadzonych przez cystersów, a dziś wpisanych na listę rezerwatów biosfery UNESCO. Tysiące hektarów stawów otoczonych lasami i łąkami tworzą raj dla ptaków — gniazduje tu ponad 180 gatunków, a jesienią zatrzymują się ogromne stada ptaków migrujących. Coroczny połów karpi w październiku to tradycyjne święto regionalne przyciągające turystów. Przez stawy poprowadzona jest sieć szlaków rowerowych i pieszych. Milicz to urokliwe miasteczko z bogatą tradycją rybacką." },

  {

let checked = JSON.parse(localStorage.getItem('ds-checked-v2') || '{}');
let currentFilter = 'all';

function save(){ localStorage.setItem('ds-checked-v2', JSON.stringify(checked)); }
function getKey(ci, ii){ return ci+'-'+ii; }

function updateStats(){
  const total = DATA.reduce((s,c)=>s+c.items.length,0);
  const done = Object.values(checked).filter(Boolean).length;
  document.getElementById('cc').textContent = done;
  document.getElementById('tc').textContent = total;
  document.getElementById('pf').style.width = (done/total*100)+'%';
}

function toggle(key, el, e){
  if(e) e.stopPropagation();
  checked[key] = !checked[key];
  if(!checked[key]) delete checked[key];
  save();
  el.classList.toggle('checked', !!checked[key]);
  el.querySelector('.checkbox').textContent = checked[key] ? '✓' : '';
  updateStats();
  applyFilter();
}

window.clearAll = function(){
  if(!confirm('Resetować wszystkie oznaczenia?')) return;
  checked={};save();render();
}

window.filterView = function(f){
  currentFilter=f;applyFilter();
}

function applyFilter(){
  document.querySelectorAll('.item').forEach(el=>{
    const c = el.classList.contains('checked');
    if(currentFilter==='all') el.classList.remove('hidden');
    else if(currentFilter==='done') el.classList.toggle('hidden',!c);
    else if(currentFilter==='todo') el.classList.toggle('hidden',c);
  });
  document.querySelectorAll('.category-section').forEach(sec=>{
    const v = sec.querySelectorAll('.item:not(.hidden)').length;
    sec.classList.toggle('hidden', v===0 && currentFilter!=='all');
  });
}

function openModal(item){
  document.getElementById('modal-title').textContent = item.name;
  const mapsUrl = 'https://www.google.com/maps/search/'+encodeURIComponent(item.name+' Dolny Śląsk');
  document.getElementById('modal-nav').href = mapsUrl;
  document.getElementById('modal-desc').textContent = item.desc;
  const wrap = document.getElementById('modal-img-wrap');
  wrap.innerHTML = '';
  if (item.img) {
    const imgEl = document.createElement('img');
    imgEl.className = 'modal-img';
    imgEl.src = 'https://wsrv.nl/?url=' + encodeURIComponent(item.img) + '&w=800&output=jpg';
    imgEl.alt = item.name;
    imgEl.onerror = function() { this.parentNode.innerHTML = '<div class="modal-img-placeholder">🏔️</div>'; };
    wrap.appendChild(imgEl);
  } else {
    wrap.innerHTML = '<div class="modal-img-placeholder">🏔️</div>';
  }
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

window.closeModal = function(e){
  if(e.target===document.getElementById('overlay')) closeModalBtn();
}
window.closeModalBtn = function(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

let globalIdx = 1;

function render(){
  globalIdx=1;
  const app=document.getElementById('app');
  app.innerHTML='';
  DATA.forEach((cat,ci)=>{
    const sec=document.createElement('div');
    sec.className='category-section';
    const header=document.createElement('div');
    header.className='category-header';
    header.innerHTML=`<span>${cat.cat.split(' ')[0]}</span><h2>${cat.cat.replace(/^\S+ /,'')}</h2><span class="cat-count">${cat.items.length}</span><span class="cat-toggle">▾</span>`;
    header.addEventListener('click',()=>sec.classList.toggle('collapsed'));
    const list=document.createElement('div');
    list.className='items-list';
    cat.items.forEach((item,ii)=>{
      const key=getKey(ci,ii);
      const isChecked=!!checked[key];
      const idx=globalIdx++;
      const el=document.createElement('div');
      el.className='item'+(isChecked?' checked':'');
      el.innerHTML=`
        <span class="item-idx">${String(idx).padStart(2,'0')}</span>
        <span class="checkbox">${isChecked?'✓':''}</span>
        <div class="item-body">
          <div class="item-name">${item.name}</div>
          <div class="item-short">${item.short}</div>
          <div class="item-meta">
            <span class="badge badge-dist">📍 ~${item.km} km</span>
            <span class="badge badge-time">🚗 ${item.time}</span>
            <button class="info-btn" onclick="openModal(DATA[${ci}].items[${ii}])">📖 opis</button>
          </div>
        </div>`;
      el.querySelector('.checkbox').addEventListener('click', e=>toggle(key,el,e));
      el.querySelector('.item-name').addEventListener('click', e=>toggle(key,el,e));
      list.appendChild(el);
    });
    sec.appendChild(header);
    sec.appendChild(list);
    app.appendChild(sec);
    const d=document.createElement('div');
    d.className='divider';
    app.appendChild(d);
  });
  updateStats();applyFilter();
}
render();

/* ════════════════════════════════════════════════
   Rejestracja Service Workera (PWA – tryb offline)
   ════════════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW zarejestrowany:', reg.scope))
      .catch(err => console.warn('SW błąd:', err));
  });
}

/* Baner "Zainstaluj jako aplikację" – pojawia się raz po 10s */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => {
    if (!deferredPrompt) return;
    const banner = document.createElement('div');
    banner.style.cssText = `
      position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);
      background:#1a1a2e;color:#f5f0e8;padding:.7rem 1.2rem;
      border-radius:8px;font-family:Lato,sans-serif;font-size:.82rem;
      display:flex;align-items:center;gap:.8rem;z-index:9999;
      box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:90vw;
    `;
    banner.innerHTML = `
      <span>📱 Zainstaluj jako aplikację</span>
      <button id="pwa-install" style="background:#c9a84c;color:#1a1a2e;border:none;
        padding:.35rem .8rem;border-radius:4px;font-weight:700;cursor:pointer;font-size:.78rem;">
        Zainstaluj
      </button>
      <button id="pwa-dismiss" style="background:transparent;color:rgba(245,240,232,.5);
        border:none;cursor:pointer;font-size:1.1rem;line-height:1;">✕</button>
    `;
    document.body.appendChild(banner);
    document.getElementById('pwa-install').onclick = () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { deferredPrompt = null; banner.remove(); });
    };
    document.getElementById('pwa-dismiss').onclick = () => banner.remove();
  }, 10000);
});
</script>
